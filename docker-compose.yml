version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hacienda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hacienda_la_ilusion
      POSTGRES_USER: hacienda
      POSTGRES_PASSWORD: hacienda_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    networks:
      - palm-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hacienda -d hacienda_la_ilusion']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: hacienda_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://hacienda:hacienda_secret@postgres:5432/hacienda_la_ilusion
      JWT_SECRET: change-me-in-production-please
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - palm-network

  dashboard:
    build: ./dashboard
    container_name: hacienda_dashboard
    restart: unless-stopped
    ports:
      - '5173:80'
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    networks:
      - palm-network

volumes:
  postgres_data:

networks:
  palm-network:
    driver: bridge
