name: hacienda_la_ilusion
description: Sistema de Gestión Agrícola — Palma Africana — Hacienda La Ilusión
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Offline database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Background sync
  workmanager: ^0.5.2

  # HTTP
  http: ^1.2.1

  # UUID generation (offline record creation)
  uuid: ^4.4.0

  # Local storage (auth token, worker session)
  shared_preferences: ^2.2.3

  # State management
  provider: ^6.1.2

  # Internationalization (COP formatting)
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.68.0

  # Animations (celebration when milestones hit)
  lottie: ^3.1.2

  # Device ID for offline records
  device_info_plus: ^10.1.0

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
